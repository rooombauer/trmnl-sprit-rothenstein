name: Fetch fuel prices

on:
  schedule:
    - cron: "0 5 * * *"   # täglich 05:00 UTC = 07:00 Sommerzeit / 06:00 Winterzeit
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preise abrufen
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
        run: python scripts/fetch_prices.py

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json
          git diff --cached --quiet || git commit -m "Preise aktualisiert: $(date -u +%Y-%m-%d)"
          git push
